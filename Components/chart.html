{{#> components-container title='Chart'}}

    <div class="c-chart">
        
        <header class="c-chart__header">
            <div class="c-chart__header__title">
                <h3 class="c-chart__title">المبيعات</h3>
                <span class="c-chart__date">10 أكتوبر 2023</span>
            </div>
            
            <div class="c-summary c-summary--small c-summary--boxless c-summary--spaceless">
                <div class="c-summary__data">
                    <span class="c-summary__key">التغيير الشهري</span>
                    <span class="c-summary__value c-summary__value-positive">%16.83</span>
                </div>
                
                <div class="c-summary__data">
                    <span class="c-summary__key">المجموع</span>
                    <span class="c-summary__value">$93389</span>
                </div>
                
                <div class="c-summary__data">
                    <span class="c-summary__key">اخر ثلاثين يوم</span>
                    <span class="c-summary__value">$1932</span>
                </div>
            </div>

            <div class="c-table__navigation">
                <div class="c-table__navigation__arrows">       
                    <button class="c-btn c-btn--icon"><i class="fa-solid fa-arrow-right"></i></button>
                    <button class="c-btn c-btn--icon"><i class="fa-solid fa-arrow-left"></i></button>
                </div>      
            </div>
        </header>

        <canvas class="c-chart__data" id="example-chart" width="600" height="300"></canvas>

    </div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>
  const ctx = document.getElementById('example-chart');

  const chart = new Chart(ctx, {
    type: 'line',
    data: {
      labels: ['ابريل', 'مارس', 'فبراير', 'يناير', 'اغسطس', 'يوليو','يونيو', 'مايو', 'ديسمبر', 'نوفمبر', 'اكتوبر', 'سبتمبر'],
      datasets: [{
        label: 'مبيعات الشهر',
        data: [332, 98, 123, 23, 345, 42, 213, 1, 234, 234, 211, 234],
        borderWidth: 1,
        borderColor: '#071ADB',
        backgroundColor: 'transparent',
        lineTension: 0.2
      }]
    },
    options: {
      plugins: {
        legend: {
            display: false,
        }
      },
      scales: {
        y: {
          display: false,
        },
        x: {
          position: 'top'
        }
      },
    },
  });

  const navigation = document.querySelector('.c-table__navigation');
  const randomArry = (myLength, max) => Array.from({ length: myLength }, () => Math.round(Math.random() * max));

  navigation.addEventListener('click', () => {
    chart.data.datasets[0].data = randomArry(12, 1200);
    chart.update();
  })
</script>

{{/components-container}}
