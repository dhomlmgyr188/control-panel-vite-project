</head>

<body>
  <div class="page-container">
        <div class="c-sidebar">
            <div class="c-sidebar__control">
                <a href="index.html" class="c-sidebar__icon c-sidebar__logo c-sidebar__icon--large">
                    <svg viewbox="0 0 35 35">
                        <circle cx="17.5" cy="17.5" r="12" fill="transparent" stroke-width="10"></circle>

                <a href="add-product.html" class="c-sidebar__icon"><i class="fa-solid fa-plus"></i></a>
                <a href="#search" class="c-sidebar__icon"><i class="fa-solid fa-magnifying-glass"></i></a>

                    <img src="images/lacoste.png">
                </a>
            </div>
            <div class="c-sidebar__menu">
                <h2 class="c-sidebar__title">
                    <a href="index.html">متجر</a>
                </h2>
                
                <nav class="c-sidebar__navigation">
                    <a href="index.html" class="c-sidebar__link"> نظرة عامة <i class="fa-solid fa-bars"></i></a>
                    <a href="products.html" class="c-sidebar__link"> المنتجات <i class="fa-solid fa-cart-shopping"></i></a>
                    <a href="users.html" class="c-sidebar__link"> المستخدمين <i class="fa-solid fa-users"></i></a>

                </nav>

            <div class="c-sidebar__backdrop"></div>
        </div>    
    <div class="single-page">
        <header class="page-header">
            <h1 class="page-title">إضافة مستخدم</h1>
            <button type="submit" class="c-btn c-btn--primary" name="submit" form="add-user">مستخدم جديد</button>
        </header>
    
        <form action="" class="c-form" id="add-user">
    
            <div class="c-upload c-upload__small js-upload">
                <header class="c-upload__header">
                    <h4 class="c-upload__title">صورة المستخدم</h4>
                </header>
    
                <div class="c-upload__body">
                    <label for="upload-image-small" class="c-upload__label c-upload__label--none">ارفع الصورة</label>
                    <img class="js-upload-placeholder">
                    <input type="file" id="upload-image-small" class="c-upload__field js-upload-value" accept="image/*">
                </div>
    
                <span class="c-upload__label c-upload__label--remove js-upload-remove">
                    احذف الصورة
                </span>
            </div>
            
            <div class="c-form__control">
                <div class="c-form__row">
                    <div class="c-textfield">
                        <label for="user-name" class="c-textfield__label">اسم المستخدم </label>
                        <input type="text" id="user-name" class="c-textfield__input" placeholder="username"
                            required>
                    </div>
                </div>
                <div class="c-form__row">
                    <div class="c-textfield">
                        <label for="user-email" class="c-textfield__label">البريد الإلكتروني  </label>
                        <input type="email" id="user-email"
                            class="c-textfield__input" placeholder="example@gmail.com" required>
                    </div>
                    <div class="c-textfield">
                        <label for="user-confirm-email" class="c-textfield__label">تأكيد البريد الإلكتروني  </label>
                        <input type="email" id="user-confirm-email"
                            class="c-textfield__input" placeholder="example@gmail.com" required>
                    </div>
                </div>
                <div class="c-form__row">
                    <div class="c-textfield">
                        <label for="user-password" class="c-textfield__label">كلمة المرور   </label>
                        <input type="password" id="user-password"
                            class="c-textfield__input" placeholder="********" required>
                    </div>
                </div>
                <div class="c-form__row">
                    <div class="c-textfield">
                        <label for="user-confirm-password" class="c-textfield__label">تأكيد كلمة المرور   </label>
                        <input type="password" id="user-confirm-password"
                            class="c-textfield__input" placeholder="********" required>
                    </div>
                </div>
                
                
            </div>
    
        </form>
    </div>
    

    <div class="c-help">
      <i class="c-help__icon fa-solid fa-circle-info"></i>
      <div>
        <span class="c-help__info">تعلم المزيد حول</span>
        <a href="index.html" class="c-help__link">المنتجات</a>
      </div>
    </div>

  </div>



</body>
